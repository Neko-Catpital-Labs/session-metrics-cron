<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Model Rules</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #fff;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #2878bd;
      --good: #169b75;
      --warn: #b45309;
      --soft: #eef5ff;
      --soft-warn: #fff7ed;
      --code: #101828;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }

    header, .section-head, .rule-summary, .subrule-head, .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    header {
      align-items: flex-end;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 23px;
      font-weight: 680;
    }

    h2 {
      font-size: 17px;
      font-weight: 660;
    }

    h3 {
      font-size: 15px;
      font-weight: 660;
    }

    .subhead {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, .nav-link {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }

    button[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--soft);
      color: #1f4f82;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .run-panel, .model-section, .rule-card, .empty, .error {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .run-panel {
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .run-main {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .value {
      overflow-wrap: anywhere;
      font-weight: 620;
      font-variant-numeric: tabular-nums;
    }

    .debug-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    body.debug .debug-panel,
    body.debug .debug-only {
      display: block;
    }

    .debug-only {
      display: none;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .status-same { color: var(--good); }
    .status-changed, .status-generated-only, .status-effective-only { color: var(--warn); }

    .model-section {
      margin-top: 16px;
      overflow: hidden;
    }

    .section-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .section-note {
      color: var(--muted);
      margin-top: 4px;
    }

    .rule-list {
      display: grid;
      gap: 0;
    }

    .rule-card {
      border-width: 0 0 1px;
      border-radius: 0;
      overflow: hidden;
    }

    .rule-card:last-child {
      border-bottom: 0;
    }

    .rule-card > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
    }

    .rule-card > summary::-webkit-details-marker {
      display: none;
    }

    .rule-summary {
      align-items: flex-start;
    }

    .rule-title {
      min-width: 0;
    }

    .rule-title h3 {
      overflow-wrap: anywhere;
    }

    .description {
      margin-top: 4px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .flow-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      color: var(--muted);
    }

    .token {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--soft);
      color: #1f4f82;
      overflow-wrap: anywhere;
    }

    .rule-meta {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 360px;
    }

    .rule-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }

    .subrule-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .subrule-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .subrule-head {
      align-items: flex-start;
    }

    .subrule-title {
      font-weight: 660;
      overflow-wrap: anywhere;
    }

    .subrule-description {
      margin-top: 6px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .metric-cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px;
      background: #fff;
      min-width: 0;
    }

    .metric-cell .value {
      font-size: 13px;
    }

    .debug-block {
      margin-top: 12px;
    }

    .terms {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .term {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 7px;
      background: #fff;
      font-size: 12px;
    }

    details.debug-only summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }

    pre {
      margin: 8px 0 0;
      padding: 12px;
      border-radius: 6px;
      background: var(--code);
      color: #f8fafc;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
    }

    .needs-section .section-head {
      background: var(--soft-warn);
    }

    .empty, .error {
      padding: 24px;
    }

    .error {
      color: #b42318;
    }

    @media (max-width: 760px) {
      main { padding: 16px; }
      header, .section-head, .rule-summary, .subrule-head, .topline {
        display: block;
      }
      .controls, .rule-meta {
        margin-top: 12px;
        justify-content: flex-start;
      }
      .run-main, .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Model Rules</h1>
        <p class="subhead">Browse the effective rule model and inspect subrules only when needed.</p>
      </div>
      <div class="controls">
        <button id="compare-toggle" type="button" aria-pressed="false">Compare</button>
        <button id="debug-toggle" type="button" aria-pressed="false">Debug</button>
        <button id="refresh" type="button">Refresh</button>
        <a class="nav-link" href="/">Metrics</a>
      </div>
    </header>

    <section id="run" class="run-panel"></section>
    <section id="content"></section>
  </main>

  <script>
    const UNCATEGORIZED_ID = "uncategorized-subrules";
    const runEl = document.getElementById("run");
    const contentEl = document.getElementById("content");
    const compareToggleEl = document.getElementById("compare-toggle");
    const debugToggleEl = document.getElementById("debug-toggle");
    const refreshEl = document.getElementById("refresh");
    let payload = null;
    let compareMode = false;
    let debugMode = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function short(value) {
      return String(value || "").slice(0, 12);
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toISOString().replace("T", " ").replace(".000Z", "Z");
    }

    function formatNumber(value, digits = 3) {
      if (value == null || value === "") return "";
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      return numeric.toFixed(digits).replace(/\.?0+$/, "");
    }

    function formatDelta(value) {
      if (value == null || value === "") return "";
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      const sign = numeric > 0 ? "+" : "";
      return `${sign}${formatNumber(numeric, 4)}`;
    }

    function metricCell(label, value) {
      return `<div class="metric-cell"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div></div>`;
    }

    function primaryCatalog() {
      return catalogByKind("effective") || catalogByKind("generated") || null;
    }

    function catalogByKind(kind) {
      return (payload?.catalogs || []).find(catalog => catalog.kind === kind) || null;
    }

    function rulesById(catalog) {
      const map = new Map();
      for (const rule of catalog?.rules || []) {
        if (rule.id) map.set(rule.id, rule);
      }
      return map;
    }

    function ruleSignature(rule) {
      return JSON.stringify(rule?.raw || rule || {});
    }

    function comparisonStatus(ruleId) {
      const generated = rulesById(catalogByKind("generated"));
      const effective = rulesById(catalogByKind("effective"));
      const generatedRule = generated.get(ruleId);
      const effectiveRule = effective.get(ruleId);
      if (generatedRule && effectiveRule && ruleSignature(generatedRule) === ruleSignature(effectiveRule)) return "same";
      if (generatedRule && effectiveRule) return "changed";
      if (generatedRule) return "generated only";
      if (effectiveRule) return "effective only";
      return "";
    }

    function allDisplayRules() {
      const primary = primaryCatalog();
      if (!compareMode) return [...(primary?.rules || [])];
      const generated = rulesById(catalogByKind("generated"));
      const effective = rulesById(catalogByKind("effective"));
      const ids = [...new Set([...generated.keys(), ...effective.keys()])];
      return ids
        .map(id => effective.get(id) || generated.get(id))
        .filter(Boolean)
        .sort((left, right) => (right.priority || 0) - (left.priority || 0) || String(left.id).localeCompare(String(right.id)));
    }

    function categorizedRules() {
      return allDisplayRules().filter(rule => rule.id !== UNCATEGORIZED_ID);
    }

    function uncategorizedRule() {
      return allDisplayRules().find(rule => rule.id === UNCATEGORIZED_ID) || null;
    }

    function renderRun(run, root, pipelinePath) {
      const promotion = run.rulePromotion || {};
      runEl.innerHTML = `
        <div class="run-main">
          <div><div class="label">Run</div><div class="value">${escapeHtml(run.runId || "")}</div></div>
          <div><div class="label">SHA</div><div class="value">${escapeHtml(short(run.headSha))}</div></div>
          <div><div class="label">Status</div><div class="value">${escapeHtml(run.pipelineStatus || "")}</div></div>
          <div><div class="label">PR</div><div class="value">${run.prUrl ? `<a href="${escapeHtml(run.prUrl)}">${escapeHtml(run.prUrl)}</a>` : ""}</div></div>
        </div>
        <div class="debug-panel">
          <div class="run-main">
            <div><div class="label">Collected</div><div class="value">${escapeHtml(formatDate(run.collectedAt))}</div></div>
            <div><div class="label">Branch</div><div class="value">${escapeHtml(run.branch || "")}</div></div>
            <div><div class="label">Promotion</div><div class="value">${escapeHtml(promotion.status || "")}</div></div>
            <div><div class="label">Promotion Reason</div><div class="value">${escapeHtml(promotion.reason || "")}</div></div>
          </div>
          <div class="pill-row debug-block">
            ${(run.repos || []).map(repo => `<span class="pill">${escapeHtml(repo)}</span>`).join("")}
          </div>
          <div class="pill-row debug-block">
            <span class="pill">${escapeHtml(root || "")}</span>
            <span class="pill">${escapeHtml(pipelinePath || "")}</span>
          </div>
        </div>
      `;
    }

    function labelDescriptions() {
      return {
        [UNCATEGORIZED_ID]: "Subrule candidates whose mined parent rule is not present in the generated or effective rule catalog.",
        "activate-one-surface-at-a-time": "Enable one user-facing, API, CLI, or integration surface per PR so each activation is reviewable, measurable, and easy to roll back.",
        "foundation/config-reader": "Add the configuration reader or lookup layer before behavior depends on it.",
        "foundation/schema-types": "Introduce schemas, types, or data models before wiring behavior through them.",
        "foundation/adapter-wrapper": "Add adapter or wrapper structure before using it for feature behavior.",
        "compatibility/api-contract": "Preserve or introduce the API compatibility contract before exposing behavior changes.",
        "behavior/config-behavior": "Implement behavior controlled by configuration or repository settings.",
        "behavior/feature-behavior": "Implement the main product or workflow behavior.",
        "behavior/test-fixture": "Add fixtures or harness support needed to verify behavior.",
        "verification/terminal-tests": "Run or add terminal-level verification after implementation is present.",
        "cleanup/legacy-cleanup": "Remove legacy code after the replacement behavior is in place."
      };
    }

    function labelTitle(label) {
      return String(label || "")
        .split("/")
        .map(part => part.split("-").filter(Boolean).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" "))
        .join(" / ");
    }

    function labelDescription(label) {
      const value = String(label || "");
      const descriptions = labelDescriptions();
      if (descriptions[value]) return descriptions[value];
      if (!value) return "";
      return `${labelTitle(value)} is a learned role label mined from PR stack examples.`;
    }

    function renderFlow(values) {
      if (!values || !values.length) return `<span class="token">none</span>`;
      return values.map(value => `<span class="token">${escapeHtml(value)}</span>`).join("");
    }

    function renderTerms(values) {
      if (!values || !values.length) return "";
      return `<div class="terms">${values.map(term => `
        <span class="term"><strong>${escapeHtml(term.text)}</strong> ${escapeHtml(term.category || "")} ${escapeHtml(term.weight == null ? "" : `w${term.weight}`)}</span>
      `).join("")}</div>`;
    }

    function fallbackPrUrl(example, key) {
      const repo = example.repo || "";
      const number = example[key];
      if (!repo || number == null || number === "") return "";
      return `https://github.com/${encodeURIComponent(repo).replace("%2F", "/")}/pull/${encodeURIComponent(number)}`;
    }

    function exampleLink(example, side) {
      const prefix = side === "from" ? "from" : "to";
      const number = example[`${prefix}Pr`];
      const commitUrl = side === "from" ? example.fromCommitUrl : example.toCommitUrl;
      const prUrl = side === "from" ? example.fromUrl : example.toUrl;
      const url = commitUrl || prUrl || fallbackPrUrl(example, `${prefix}Pr`);
      const label = `#${number ?? ""}`;
      if (!url) return escapeHtml(label);
      return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
    }

    function renderExamples(examples) {
      if (!examples || !examples.length) return "";
      return `<div class="debug-only debug-block">
        <div class="label">Examples</div>
        <div class="terms">
          ${examples.slice(0, 6).map(example => `
            <span class="term">
              <strong>${escapeHtml(example.repo || "")}</strong>
              ${exampleLink(example, "from")} &rarr; ${exampleLink(example, "to")}
            </span>
          `).join("")}
        </div>
      </div>`;
    }

    function renderSubrule(subrule) {
      const validation = subrule.validation || {};
      const test = subrule.test || {};
      const decision = subrule.decision || (subrule.promoted ? "promoted" : "candidate");
      const reason = subrule.failureBucket || subrule.rejectedReason || "";
      return `<article class="subrule-card">
        <div class="subrule-head">
          <div>
            <div class="subrule-title">${escapeHtml(subrule.before || "")} &rarr; ${escapeHtml(subrule.after || "")}</div>
            <div class="subrule-description">
              <strong>${escapeHtml(labelTitle(subrule.before))}</strong>: ${escapeHtml(labelDescription(subrule.before))}
              <br>
              <strong>${escapeHtml(labelTitle(subrule.after))}</strong>: ${escapeHtml(labelDescription(subrule.after))}
            </div>
          </div>
          <span class="pill">${escapeHtml(reason ? `${decision}: ${reason}` : decision)}</span>
        </div>
        <div class="metric-grid">
          ${metricCell("Support", `${formatNumber(subrule.support, 0)} / ${formatNumber(subrule.repoSupport, 0)} repos`)}
          ${metricCell("Confidence", formatNumber(subrule.confidence, 3))}
          ${metricCell("Validation delta", formatDelta(validation.stackLinkDelta))}
          ${metricCell("Test delta", formatDelta(test.stackLinkDelta))}
        </div>
        <div class="metric-grid">
          ${metricCell("Validation paired", formatNumber(validation.pairedCount, 0))}
          ${metricCell("Test paired", formatNumber(test.pairedCount, 0))}
          ${metricCell("Validation regressions", formatNumber(validation.regressionCount, 0))}
          ${metricCell("Test regressions", formatNumber(test.regressionCount, 0))}
        </div>
        <div class="debug-only debug-block">
          <div class="pill-row">
            <span class="pill">source parent ${escapeHtml(subrule.sourceParentRuleId || subrule.parentRuleId || "")}</span>
            ${(subrule.repos || []).map(repo => `<span class="pill">${escapeHtml(repo)}</span>`).join("")}
          </div>
        </div>
        ${renderExamples(subrule.examples)}
        <details class="debug-only debug-block">
          <summary>Raw JSON</summary>
          <pre>${escapeHtml(JSON.stringify(subrule.raw || subrule, null, 2))}</pre>
        </details>
      </article>`;
    }

    function renderRule(rule, options = {}) {
      const subrules = rule.subrules || [];
      const status = comparisonStatus(rule.id);
      const compareBadge = compareMode && status ? `<span class="pill status-${status.replaceAll(" ", "-")}">${escapeHtml(status)}</span>` : "";
      const className = options.needsCategorization ? "rule-card needs-rule" : "rule-card";
      return `<details class="${className}">
        <summary>
          <div class="rule-summary">
            <div class="rule-title">
              <h3>${escapeHtml(rule.id || "")}</h3>
              <div class="description">${escapeHtml(rule.reason || rule.reasonId || labelDescription(rule.id))}</div>
              <div class="flow-line">
                ${renderFlow(rule.before)}
                <span>&rarr;</span>
                ${renderFlow(rule.after)}
              </div>
            </div>
            <div class="rule-meta">
              ${compareBadge}
              <span class="pill">${escapeHtml(subrules.length)} subrules</span>
            </div>
          </div>
        </summary>
        <div class="rule-body">
          ${subrules.length ? `<div class="subrule-list">${subrules.map(renderSubrule).join("")}</div>` : `<div class="empty">No subrules attached to this rule.</div>`}
          <div class="debug-only debug-block">
            <div class="pill-row">
              <span class="pill">relation ${escapeHtml(rule.relation || "")}</span>
              <span class="pill">priority ${escapeHtml(rule.priority ?? "")}</span>
              <span class="pill">threshold ${escapeHtml(rule.triggerThreshold ?? "")}</span>
              <span class="pill">${escapeHtml(rule.reasonId || "")}</span>
            </div>
            ${renderTerms(rule.triggerTerms)}
          </div>
          <details class="debug-only debug-block">
            <summary>Raw JSON</summary>
            <pre>${escapeHtml(JSON.stringify(rule.raw || rule, null, 2))}</pre>
          </details>
        </div>
      </details>`;
    }

    function sectionStats(rules) {
      const subruleCount = rules.reduce((sum, rule) => sum + (rule.subrules || []).length, 0);
      return `<div class="pill-row">
        <span class="pill">${escapeHtml(rules.length)} rules</span>
        <span class="pill">${escapeHtml(subruleCount)} subrules</span>
      </div>`;
    }

    function renderSection(title, note, rules, options = {}) {
      if (!rules.length) return "";
      return `<section class="model-section ${options.needsCategorization ? "needs-section" : ""}">
        <div class="section-head">
          <div>
            <h2>${escapeHtml(title)}</h2>
            <div class="section-note">${escapeHtml(note)}</div>
          </div>
          ${sectionStats(rules)}
        </div>
        <div class="rule-list">
          ${rules.map(rule => renderRule(rule, options)).join("")}
        </div>
      </section>`;
    }

    function render() {
      if (!payload) return;
      document.body.classList.toggle("debug", debugMode);
      compareToggleEl.setAttribute("aria-pressed", String(compareMode));
      debugToggleEl.setAttribute("aria-pressed", String(debugMode));
      renderRun(payload.run || {}, payload.workflowAnalysisRoot, payload.pipelineRunPath);
      const categorized = categorizedRules();
      const uncategorized = uncategorizedRule();
      const sections = [
        renderSection("Categorized Rules", "Rules currently present in the effective model catalog.", categorized),
        uncategorized ? renderSection("Needs Categorization", "Mined subrule candidates whose parent rule is still a broad generated bucket.", [uncategorized], { needsCategorization: true }) : ""
      ].join("");
      contentEl.innerHTML = sections || `<div class="empty">No rule catalogs found.</div>`;
    }

    async function loadRules() {
      runEl.innerHTML = `<div class="label">Loading</div><div class="value">Fetching latest rules...</div>`;
      contentEl.innerHTML = "";
      try {
        const response = await fetch("/api/splitter-rules", { cache: "no-store" });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || `HTTP ${response.status}`);
        payload = data;
        render();
      } catch (error) {
        runEl.innerHTML = "";
        contentEl.innerHTML = `<div class="error">${escapeHtml(error.message || error)}</div>`;
      }
    }

    compareToggleEl.addEventListener("click", () => {
      compareMode = !compareMode;
      render();
    });
    debugToggleEl.addEventListener("click", () => {
      debugMode = !debugMode;
      render();
    });
    refreshEl.addEventListener("click", loadRules);
    loadRules();
  </script>
</body>
</html>

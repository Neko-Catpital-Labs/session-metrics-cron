<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Splitter Rules</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --accent: #2878bd;
      --good: #169b75;
      --warn: #b45309;
      --soft: #eef5ff;
      --code: #101828;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .subhead {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, input, select, .nav-link {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }

    input {
      width: 320px;
      cursor: text;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .run-panel, .catalog-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .run-panel {
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .run-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .value {
      overflow-wrap: anywhere;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .repo-list {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    .catalog-panel + .catalog-panel {
      margin-top: 16px;
    }

    .catalog-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .catalog-head h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .catalog-path {
      margin-top: 3px;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .rules {
      display: grid;
      gap: 0;
    }

    .rule {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .rule:last-child {
      border-bottom: 0;
    }

    .rule-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .rule h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .priority {
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .reason {
      margin-top: 6px;
      color: var(--muted);
    }

    .flow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr);
      gap: 10px;
      margin-top: 12px;
      align-items: stretch;
    }

    .flow-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      min-width: 0;
    }

    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 18px;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 6px;
      background: var(--soft);
      color: #1f4f82;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .terms {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .term {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 7px;
      background: #fff;
      font-size: 12px;
    }

    .term strong {
      color: var(--code);
      font-weight: 650;
    }

    details {
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }

    pre {
      margin: 8px 0 0;
      padding: 12px;
      border-radius: 6px;
      background: #101828;
      color: #f8fafc;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
    }

    .empty, .error {
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .error {
      color: #b42318;
    }

    @media (max-width: 760px) {
      main { padding: 16px; }
      header {
        display: block;
      }
      .controls {
        margin-top: 12px;
      }
      input {
        width: 100%;
      }
      .run-grid {
        grid-template-columns: 1fr;
      }
      .catalog-head {
        display: block;
      }
      .stats {
        justify-content: flex-start;
        margin-top: 10px;
      }
      .rule-head {
        grid-template-columns: 1fr;
      }
      .flow {
        grid-template-columns: 1fr;
      }
      .arrow {
        min-height: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Splitter Rules</h1>
        <p class="subhead">Generated rule catalogs from the latest stack learning run.</p>
      </div>
      <div class="controls">
        <input id="search" placeholder="Filter rules" aria-label="Filter rules">
        <select id="catalog-filter" aria-label="Catalog">
          <option value="all">All catalogs</option>
          <option value="generated">Generated</option>
          <option value="effective">Effective</option>
        </select>
        <button id="refresh" type="button">Refresh</button>
        <a class="nav-link" href="/">Metrics</a>
      </div>
    </header>

    <section id="run" class="run-panel"></section>
    <section id="content"></section>
  </main>

  <script>
    const runEl = document.getElementById("run");
    const contentEl = document.getElementById("content");
    const searchEl = document.getElementById("search");
    const catalogFilterEl = document.getElementById("catalog-filter");
    const refreshEl = document.getElementById("refresh");
    let payload = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function short(value) {
      return String(value || "").slice(0, 12);
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toISOString().replace("T", " ").replace(".000Z", "Z");
    }

    function renderRun(run, root, pipelinePath) {
      const promotion = run.rulePromotion || {};
      runEl.innerHTML = `
        <div class="run-grid">
          <div><div class="label">Learning Run</div><div class="value">${escapeHtml(run.runId || "")}</div></div>
          <div><div class="label">Generated Against SHA</div><div class="value">${escapeHtml(short(run.headSha))}</div></div>
          <div><div class="label">Branch</div><div class="value">${escapeHtml(run.branch || "")}</div></div>
          <div><div class="label">Status</div><div class="value">${escapeHtml(run.pipelineStatus || "")}</div></div>
          <div><div class="label">Collected</div><div class="value">${escapeHtml(formatDate(run.collectedAt))}</div></div>
          <div><div class="label">Promotion</div><div class="value">${escapeHtml(promotion.status || "")}</div></div>
          <div><div class="label">Promotion Reason</div><div class="value">${escapeHtml(promotion.reason || "")}</div></div>
          <div><div class="label">PR</div><div class="value">${run.prUrl ? `<a href="${escapeHtml(run.prUrl)}">${escapeHtml(run.prUrl)}</a>` : ""}</div></div>
        </div>
        <div class="repo-list">
          ${(run.repos || []).map(repo => `<span class="pill">${escapeHtml(repo)}</span>`).join("")}
        </div>
        <div class="repo-list">
          <span class="pill">${escapeHtml(root || "")}</span>
          <span class="pill">${escapeHtml(pipelinePath || "")}</span>
        </div>
      `;
    }

    function ruleText(rule) {
      return [
        rule.id,
        rule.relation,
        rule.reasonId,
        rule.reason,
        ...(rule.before || []),
        ...(rule.after || []),
        ...(rule.triggerTerms || []).map(term => `${term.text} ${term.category} ${term.weight}`)
      ].join(" ").toLowerCase();
    }

    function chips(values) {
      if (!values || !values.length) return `<span class="pill">none</span>`;
      return values.map(value => `<span class="chip">${escapeHtml(value)}</span>`).join("");
    }

    function terms(values) {
      if (!values || !values.length) return "";
      return `<div class="terms">${values.map(term => `
        <span class="term"><strong>${escapeHtml(term.text)}</strong> ${escapeHtml(term.category || "")} ${escapeHtml(term.weight == null ? "" : `w${term.weight}`)}</span>
      `).join("")}</div>`;
    }

    function renderRule(rule) {
      return `<article class="rule">
        <div class="rule-head">
          <div>
            <h3>${escapeHtml(rule.id || "")}</h3>
            <div class="reason">${escapeHtml(rule.reason || rule.reasonId || "")}</div>
          </div>
          <div class="priority">P${escapeHtml(rule.priority ?? "")}</div>
        </div>
        <div class="flow">
          <div class="flow-box">
            <div class="label">Before</div>
            <div class="chips">${chips(rule.before)}</div>
          </div>
          <div class="arrow">&rarr;</div>
          <div class="flow-box">
            <div class="label">After</div>
            <div class="chips">${chips(rule.after)}</div>
          </div>
        </div>
        <div class="repo-list">
          <span class="pill">relation ${escapeHtml(rule.relation || "")}</span>
          <span class="pill">threshold ${escapeHtml(rule.triggerThreshold ?? "")}</span>
          <span class="pill">${escapeHtml(rule.reasonId || "")}</span>
        </div>
        ${terms(rule.triggerTerms)}
        <details>
          <summary>Raw JSON</summary>
          <pre>${escapeHtml(JSON.stringify(rule.raw || rule, null, 2))}</pre>
        </details>
      </article>`;
    }

    function renderCatalog(catalog, query) {
      const filteredRules = (catalog.rules || []).filter(rule => !query || ruleText(rule).includes(query));
      return `<section class="catalog-panel" data-kind="${escapeHtml(catalog.kind)}">
        <div class="catalog-head">
          <div>
            <h2>${escapeHtml(catalog.title || catalog.kind)}</h2>
            <div class="catalog-path">${escapeHtml(catalog.path || "")}</div>
          </div>
          <div class="stats">
            <span class="pill">${escapeHtml(catalog.counts?.rules ?? 0)} rules</span>
            <span class="pill">${escapeHtml(catalog.counts?.actions ?? 0)} actions</span>
            <span class="pill">${escapeHtml(catalog.counts?.reasons ?? 0)} reasons</span>
            <span class="pill">v${escapeHtml(catalog.version ?? "")}</span>
          </div>
        </div>
        <div class="rules">
          ${filteredRules.length ? filteredRules.map(renderRule).join("") : `<div class="empty">No rules match this filter.</div>`}
        </div>
      </section>`;
    }

    function render() {
      if (!payload) return;
      const query = searchEl.value.trim().toLowerCase();
      const catalogKind = catalogFilterEl.value;
      renderRun(payload.run || {}, payload.workflowAnalysisRoot, payload.pipelineRunPath);
      const catalogs = (payload.catalogs || []).filter(catalog => catalogKind === "all" || catalog.kind === catalogKind);
      contentEl.innerHTML = catalogs.length
        ? catalogs.map(catalog => renderCatalog(catalog, query)).join("")
        : `<div class="empty">No rule catalogs found.</div>`;
    }

    async function loadRules() {
      runEl.innerHTML = `<div class="label">Loading</div><div class="value">Fetching latest rules...</div>`;
      contentEl.innerHTML = "";
      try {
        const response = await fetch("/api/splitter-rules", { cache: "no-store" });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || `HTTP ${response.status}`);
        payload = data;
        render();
      } catch (error) {
        runEl.innerHTML = "";
        contentEl.innerHTML = `<div class="error">${escapeHtml(error.message || error)}</div>`;
      }
    }

    searchEl.addEventListener("input", render);
    catalogFilterEl.addEventListener("change", render);
    refreshEl.addEventListener("click", loadRules);
    loadRules();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Splitter Metric Tree MVP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --score: #2878bd;
      --local: #8a5cf6;
      --effective: #169b75;
      --row: #fbfcfe;
      --row-open: #eef5ff;
      --selected: #b7d7ff;
      --axis: #98a2b3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .subhead {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, input, select {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }

    input {
      width: 360px;
      cursor: text;
    }

    select { cursor: pointer; }

    button:hover { background: #f2f4f7; }

    .legend {
      display: flex;
      gap: 14px;
      color: var(--muted);
      margin: 0 0 12px;
      flex-wrap: wrap;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 6px;
    }

    .legend .score::before { background: var(--score); }
    .legend .local::before { background: var(--local); }
    .legend .effective::before { background: var(--effective); }

    .history-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    .history-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .history-title {
      min-width: 0;
    }

    .history-title h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: 0;
    }

    .history-title .path {
      margin-top: 4px;
      max-width: 720px;
    }

    .history-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .history-chart {
      position: relative;
      padding: 12px 16px 16px;
      min-height: 236px;
    }

    .chart-svg {
      display: block;
      width: 100%;
      height: 220px;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .grid-line {
      stroke: #eef1f5;
      stroke-width: 1;
    }

    .score-line {
      fill: none;
      stroke: var(--score);
      stroke-width: 2.5;
    }

    .score-point {
      fill: #fff;
      stroke: var(--score);
      stroke-width: 2;
      cursor: pointer;
      outline: none;
    }

    .score-point:hover,
    .score-point:focus {
      fill: #e8f2ff;
      stroke-width: 3;
    }

    .point-popup {
      position: absolute;
      z-index: 3;
      display: none;
      pointer-events: none;
      min-width: 260px;
      max-width: min(360px, calc(100vw - 48px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.18);
      color: var(--text);
      font-size: 12px;
    }

    .point-popup.is-visible { display: block; }

    .point-popup h3 {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .point-popup dl {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 4px 8px;
      margin: 0;
    }

    .point-popup dt {
      color: var(--muted);
    }

    .point-popup dd {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    table {
      width: 100%;
      min-width: 1560px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #344054;
      font-size: 12px;
      font-weight: 650;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr { background: var(--panel); }
    tbody tr[data-kind="composite"],
    tbody tr[data-kind="root"] { background: var(--row); }
    tbody tr.is-open { background: var(--row-open); }
    tbody tr.is-selected {
      outline: 2px solid var(--selected);
      outline-offset: -2px;
    }

    .node-col { width: 390px; }
    .desc-col { width: 390px; }
    .metric-col { width: 190px; }
    .spark-col { width: 210px; }

    .node {
      display: grid;
      grid-template-columns: max(var(--indent), 0px) 24px minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    tr[data-depth="0"] .node {
      grid-template-columns: 24px minmax(0, 1fr);
    }

    .connector {
      height: 28px;
      border-left: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-left: calc(var(--indent) - 14px);
      display: none;
    }

    tr[data-depth]:not([data-depth="0"]) .connector { display: block; }

    .toggle {
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #475467;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .toggle.placeholder {
      border-color: transparent;
      background: transparent;
      cursor: default;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    tr[data-depth="0"] .name {
      font-size: 13px;
      line-height: 1.2;
      overflow-wrap: normal;
      white-space: nowrap;
    }

    .desc {
      color: #475467;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .pill {
      display: inline-flex;
      height: 22px;
      align-items: center;
      border-radius: 999px;
      padding: 0 8px;
      border: 1px solid var(--line);
      color: #344054;
      background: #fff;
      font-size: 12px;
    }

    .metric {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 8px;
      align-items: center;
    }

    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #344054;
    }

    .track {
      height: 10px;
      background: #eef1f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: calc(var(--value) * 1%);
      border-radius: inherit;
    }

    .fill.score { background: var(--score); }
    .fill.local { background: var(--local); }
    .fill.effective { background: var(--effective); }

    .path {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spark {
      width: 170px;
      height: 32px;
      display: block;
    }

    .empty {
      padding: 26px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 960px) {
      main { padding: 16px; }
      header { align-items: flex-start; flex-direction: column; }
      .history-head { flex-direction: column; }
      .history-meta { justify-content: flex-start; }
    }

    @media (max-width: 760px) {
      main { padding: 12px; }
      h1 { font-size: 18px; }
      .subhead { font-size: 13px; }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      input {
        grid-column: 1 / -1;
        width: 100%;
      }

      button,
      select {
        width: 100%;
        padding: 0 8px;
      }

      .history-title .path {
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .history-chart {
        padding: 8px 10px 12px;
        min-height: 196px;
      }

      .chart-svg { height: 180px; }

      .table-wrap {
        background: transparent;
        border: 0;
        border-radius: 0;
        overflow: visible;
        box-shadow: none;
      }

      table,
      tbody {
        display: block;
        width: 100%;
        min-width: 0;
      }

      thead { display: none; }

      tbody {
        display: grid;
        gap: 8px;
      }

      tbody tr {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
      }

      th,
      td {
        display: block;
        width: auto;
        border-bottom: 0;
        padding: 8px 10px;
      }

      td[data-label]::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: .04em;
      }

      .node-col,
      .desc-col,
      .spark-col {
        grid-column: 1 / -1;
      }

      .node-col {
        border-bottom: 1px solid var(--line);
        background: var(--row);
      }

      .metric-col,
      .spark-col {
        width: auto;
      }

      .metric {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .spark {
        width: 100%;
        max-width: 320px;
      }

      .node {
        grid-template-columns: minmax(0, calc(var(--indent) * .65)) 24px minmax(0, 1fr);
      }

      tr[data-depth="0"] .node {
        grid-template-columns: 24px minmax(0, 1fr);
      }

      tr[data-depth="0"] .name {
        white-space: normal;
        overflow-wrap: anywhere;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Splitter Metric Tree MVP</h1>
        <p class="subhead">One visual: hierarchy, description, holistic score, local weight, and effective root weight.</p>
      </div>
      <div class="controls">
        <input id="metric-path" value="planToResponseGraphScore" aria-label="Metric path">
        <select id="variant" aria-label="Variant">
          <option value="hinted">hinted</option>
          <option value="baseline">baseline</option>
        </select>
        <select id="history-runs" aria-label="History runs">
          <option value="10">10 runs</option>
          <option value="20" selected>20 runs</option>
          <option value="50">50 runs</option>
        </select>
        <button type="button" id="refresh">Refresh</button>
        <button type="button" id="expand">Expand All</button>
        <button type="button" id="collapse">Collapse Composites</button>
      </div>
    </header>

    <div class="legend" aria-label="Legend">
      <span class="score">Score</span>
      <span class="local">Local weight</span>
      <span class="effective">Effective weight</span>
    </div>

    <section class="history-panel" aria-label="Selected metric score history">
      <div class="history-head">
        <div class="history-title">
          <h2 id="selected-name">Score Over Time</h2>
          <div class="path" id="selected-path"></div>
        </div>
        <div class="history-meta" id="selected-meta"></div>
      </div>
      <div class="history-chart" id="history-chart"></div>
    </section>

    <section class="table-wrap" aria-label="Metric tree">
      <table>
        <thead>
          <tr>
            <th class="node-col">Metric Tree</th>
            <th class="desc-col">Description</th>
            <th class="metric-col">Score</th>
            <th class="metric-col">Local Weight</th>
            <th class="metric-col">Effective Weight</th>
            <th class="spark-col">Score Trend</th>
          </tr>
        </thead>
        <tbody id="tree-body"></tbody>
      </table>
    </section>
  </main>

  <script>
    let rows = [];
    let history = {};
    let children = new Map();
    let selectedPath = "";
    let activeHistoryPoints = [];
    let popupPinned = false;
    let activePopupIndex = null;
    const collapsed = new Set();
    const tbody = document.getElementById("tree-body");
    const selectedName = document.getElementById("selected-name");
    const selectedPathLabel = document.getElementById("selected-path");
    const selectedMeta = document.getElementById("selected-meta");
    const historyChart = document.getElementById("history-chart");
    const pointPopup = document.createElement("div");
    pointPopup.className = "point-popup";
    pointPopup.setAttribute("role", "dialog");
    historyChart.appendChild(pointPopup);

    function setHistoryChart(html) {
      historyChart.innerHTML = html;
      historyChart.appendChild(pointPopup);
    }

    function formatScore(value) {
      return Number(value).toFixed(4).replace(/0+$/, "").replace(/\.$/, "");
    }

    function formatPct(value) {
      return `${Number(value).toFixed(2).replace(/0+$/, "").replace(/\.$/, "")}%`;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toISOString().replace("T", " ").replace(".000Z", "Z");
    }

    function formatAxisTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const month = String(date.getUTCMonth() + 1).padStart(2, "0");
      const day = String(date.getUTCDate()).padStart(2, "0");
      const hour = String(date.getUTCHours()).padStart(2, "0");
      const minute = String(date.getUTCMinutes()).padStart(2, "0");
      return `${month}-${day} ${hour}:${minute}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function metricCell(value, pct, cls) {
      if (value == null) return "";
      return `
        <div class="metric">
          <div class="value">${pct ? formatPct(value) : formatScore(value)}</div>
          <div class="track"><div class="fill ${cls}" style="--value:${pct ? value : value * 100}"></div></div>
        </div>
      `;
    }

    function sparkline(points) {
      const values = (points || []).map(point => Number(point.score)).filter(value => Number.isFinite(value));
      if (values.length < 2) return "";
      const width = 170;
      const height = 32;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const spread = max - min || 1;
      const step = width / (values.length - 1);
      const polyline = values.map((value, index) => {
        const x = index * step;
        const y = height - ((value - min) / spread) * (height - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");
      return `<svg class="spark" viewBox="0 0 ${width} ${height}" aria-hidden="true">
        <polyline points="${polyline}" fill="none" stroke="var(--score)" stroke-width="2" />
      </svg>`;
    }

    function historyPoints(path) {
      return (history[path] || [])
        .filter(point => Number.isFinite(Number(point.score)))
        .sort((a, b) => String(a.collected_at).localeCompare(String(b.collected_at)));
    }

    function selectedRow() {
      return rows.find(row => row.metric_path === selectedPath) || rows[0] || null;
    }

    function renderHistoryPanel() {
      const row = selectedRow();
      if (!row) {
        selectedName.textContent = "Score Over Time";
        selectedPathLabel.textContent = "";
        selectedMeta.innerHTML = "";
        activeHistoryPoints = [];
        setHistoryChart(`<div class="empty">No metric history loaded.</div>`);
        return;
      }
      selectedPath = row.metric_path;
      const points = historyPoints(row.metric_path);
      activeHistoryPoints = points;
      hidePointPopup(true);
      const latestPoint = points[points.length - 1] || {};
      selectedName.textContent = row.metric_id;
      selectedPathLabel.textContent = row.metric_path;
      selectedPathLabel.title = row.metric_path;
      selectedMeta.innerHTML = `
        <span class="pill">Score ${formatScore(row.score)}</span>
        <span class="pill">Local ${formatPct(row.local_weight_pct)}</span>
        <span class="pill">Effective ${formatPct(row.effective_weight_pct)}</span>
        <span class="pill">${escapeHtml(latestPoint.short_sha || row.short_sha || "unknown sha")}</span>
      `;
      setHistoryChart(scoreHistoryChart(points));
    }

    function scoreHistoryChart(points) {
      if (!points.length) return `<div class="empty">No score history for this metric.</div>`;
      const width = 920;
      const height = 220;
      const left = 44;
      const right = 18;
      const top = 16;
      const bottom = 44;
      const plotWidth = width - left - right;
      const plotHeight = height - top - bottom;
      const xFor = index => points.length === 1
        ? left + plotWidth / 2
        : left + (plotWidth * index) / (points.length - 1);
      const yFor = value => top + plotHeight - (Math.max(0, Math.min(1, Number(value))) * plotHeight);
      const path = points.map((point, index) => {
        const command = index === 0 ? "M" : "L";
        return `${command}${xFor(index).toFixed(1)},${yFor(point.score).toFixed(1)}`;
      }).join(" ");
      const yTicks = [1, 0.75, 0.5, 0.25, 0];
      const labelEvery = Math.max(1, Math.ceil(points.length / 6));
      const grid = yTicks.map(value => {
        const y = yFor(value);
        return `
          <line class="grid-line" x1="${left}" y1="${y}" x2="${width - right}" y2="${y}" />
          <text class="axis-label" x="${left - 8}" y="${y + 4}" text-anchor="end">${formatScore(value)}</text>
        `;
      }).join("");
      const labels = points.map((point, index) => {
        if (index % labelEvery !== 0 && index !== points.length - 1) return "";
        const x = xFor(index);
        return `<text class="axis-label" x="${x}" y="${height - 12}" text-anchor="middle">${escapeHtml(formatAxisTime(point.collected_at))}</text>`;
      }).join("");
      const circles = points.map((point, index) => {
        const x = xFor(index);
        const y = yFor(point.score);
        return `<circle class="score-point" cx="${x}" cy="${y}" r="4" tabindex="0" data-point-index="${index}" aria-label="${escapeHtml(formatDate(point.collected_at))} score ${escapeHtml(formatScore(point.score))}"></circle>`;
      }).join("");
      return `<svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Score over time">
        ${grid}
        <line class="grid-line" x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" />
        ${path ? `<path class="score-line" d="${path}" />` : ""}
        ${circles}
        ${labels}
      </svg>`;
    }

    function pointFromTarget(target) {
      const index = Number(target?.dataset?.pointIndex);
      if (!Number.isInteger(index)) return null;
      return activeHistoryPoints[index] || null;
    }

    function pointPosition(target) {
      const chartRect = historyChart.getBoundingClientRect();
      const pointRect = target.getBoundingClientRect();
      return {
        x: pointRect.left - chartRect.left + pointRect.width / 2,
        y: pointRect.top - chartRect.top
      };
    }

    function showPointPopup(point, target, pinned = false) {
      if (!point) return;
      const pointIndex = target?.dataset?.pointIndex || "";
      if (
        pointPopup.classList.contains("is-visible")
        && activePopupIndex === pointIndex
        && popupPinned === pinned
      ) {
        return;
      }
      popupPinned = pinned;
      activePopupIndex = pointIndex;
      const position = pointPosition(target);
      pointPopup.innerHTML = `
        <h3>${escapeHtml(point.short_sha || "unknown sha")}</h3>
        <dl>
          <dt>Score</dt><dd>${escapeHtml(formatScore(point.score))}</dd>
          <dt>Time</dt><dd>${escapeHtml(formatDate(point.collected_at))}</dd>
          <dt>Branch</dt><dd>${escapeHtml(point.branch || "")}</dd>
          <dt>Run</dt><dd>${escapeHtml(point.run_id || "")}</dd>
          <dt>SHA</dt><dd>${escapeHtml(point.head_sha || "")}</dd>
        </dl>
      `;
      pointPopup.classList.add("is-visible");
      const popupWidth = Math.min(360, pointPopup.offsetWidth || 260);
      const left = Math.max(8, Math.min(position.x - popupWidth / 2, historyChart.clientWidth - popupWidth - 8));
      const top = Math.max(8, position.y - pointPopup.offsetHeight - 12);
      pointPopup.style.left = `${left}px`;
      pointPopup.style.top = `${top}px`;
    }

    function hidePointPopup(force = false) {
      if (popupPinned && !force) return;
      popupPinned = false;
      activePopupIndex = null;
      pointPopup.classList.remove("is-visible");
    }

    function hasChildren(row) {
      return (children.get(row.metric_path) || []).length > 0;
    }

    function isHidden(row) {
      const parts = row.metric_path.split(".");
      for (let i = 1; i < parts.length; i++) {
        const ancestor = parts.slice(0, i).join(".");
        if (collapsed.has(ancestor)) return true;
      }
      return false;
    }

    function render() {
      tbody.innerHTML = "";
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty">No metric rows loaded.</div></td></tr>`;
        return;
      }
      for (const row of rows) {
        if (isHidden(row)) continue;
        const tr = document.createElement("tr");
        const open = !collapsed.has(row.metric_path);
        tr.dataset.depth = String(row.relative_depth);
        tr.dataset.kind = row.kind;
        tr.dataset.path = row.metric_path;
        tr.className = [
          open && hasChildren(row) ? "is-open" : "",
          row.metric_path === selectedPath ? "is-selected" : ""
        ].filter(Boolean).join(" ");
        tr.innerHTML = `
          <td class="node-col" data-label="Metric Tree">
            <div class="node" style="--indent:${row.relative_depth * 28}px">
              <span class="connector"></span>
              ${hasChildren(row)
                ? `<button class="toggle" type="button" data-path="${row.metric_path}" aria-label="${open ? "Collapse" : "Expand"} ${row.metric_id}">${open ? "−" : "+"}</button>`
                : `<span class="toggle placeholder"></span>`}
              <span class="name" title="${row.metric_path}">${row.metric_id}</span>
            </div>
          </td>
          <td class="desc-col" data-label="Description"><div class="desc" title="${row.description}">${row.description}</div></td>
          <td class="metric-col" data-label="Score">${metricCell(row.score, false, "score")}</td>
          <td class="metric-col" data-label="Local Weight">${metricCell(row.local_weight_pct, true, "local")}</td>
          <td class="metric-col" data-label="Effective Weight">${metricCell(row.effective_weight_pct, true, "effective")}</td>
          <td class="spark-col" data-label="Score Trend">${sparkline(history[row.metric_path])}</td>
        `;
        tbody.appendChild(tr);
      }
      renderHistoryPanel();
    }

    function indexRows(nextRows) {
      const nextChildren = new Map();
      for (const row of nextRows) {
        const parentPath = row.parent_metric_path || (row.metric_path.includes(".")
          ? row.metric_path.replace(/\.[^.]+$/, "")
          : "");
        if (!nextChildren.has(parentPath)) nextChildren.set(parentPath, []);
        nextChildren.get(parentPath).push(row);
      }
      children = nextChildren;
    }

    async function loadTree() {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty">Loading metric tree...</div></td></tr>`;
      const params = new URLSearchParams({
        metric_path: document.getElementById("metric-path").value,
        variant: document.getElementById("variant").value,
        history_runs: document.getElementById("history-runs").value
      });
      const response = await fetch(`/api/splitter-metric-tree?${params.toString()}`);
      const payload = await response.json();
      if (!response.ok || payload.error) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty">${payload.error || "Failed to load metric tree."}</div></td></tr>`;
        return;
      }
      rows = payload.rows || [];
      history = payload.history || {};
      indexRows(rows);
      collapsed.clear();
      if (!rows.some(row => row.metric_path === selectedPath)) {
        selectedPath = rows[0]?.metric_path || "";
      }
      render();
    }

    tbody.addEventListener("click", event => {
      const button = event.target.closest(".toggle[data-path]");
      if (button) {
        const path = button.dataset.path;
        if (collapsed.has(path)) collapsed.delete(path);
        else collapsed.add(path);
        render();
        return;
      }
      const row = event.target.closest("tr[data-path]");
      if (!row) return;
      selectedPath = row.dataset.path;
      render();
    });

    historyChart.addEventListener("pointerover", event => {
      const point = event.target.closest(".score-point");
      if (!point) return;
      showPointPopup(pointFromTarget(point), point, false);
    });

    historyChart.addEventListener("pointerout", event => {
      if (!event.target.closest(".score-point")) return;
      hidePointPopup();
    });

    historyChart.addEventListener("focusin", event => {
      const point = event.target.closest(".score-point");
      if (!point) return;
      showPointPopup(pointFromTarget(point), point, false);
    });

    historyChart.addEventListener("focusout", event => {
      if (!event.target.closest(".score-point")) return;
      hidePointPopup();
    });

    historyChart.addEventListener("click", event => {
      const point = event.target.closest(".score-point");
      if (!point) return;
      event.stopPropagation();
      showPointPopup(pointFromTarget(point), point, true);
    });

    document.addEventListener("click", event => {
      if (historyChart.contains(event.target)) return;
      hidePointPopup(true);
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") hidePointPopup(true);
    });

    document.getElementById("expand").addEventListener("click", () => {
      collapsed.clear();
      render();
    });

    document.getElementById("collapse").addEventListener("click", () => {
      collapsed.clear();
      for (const row of rows) {
        if (row.relative_depth > 0 && hasChildren(row)) collapsed.add(row.metric_path);
      }
      render();
    });

    document.getElementById("refresh").addEventListener("click", loadTree);
    document.getElementById("metric-path").addEventListener("keydown", event => {
      if (event.key === "Enter") loadTree();
    });
    document.getElementById("variant").addEventListener("change", loadTree);
    document.getElementById("history-runs").addEventListener("change", loadTree);

    loadTree();
  </script>
</body>
</html>
